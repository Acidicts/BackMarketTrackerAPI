services:
  backmarket-api:
    build: .
    container_name: backmarket-api
    ports:
      - "8000:8000"
    volumes:
      - backmarket-data:/app/db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./db/backmarket.db
    restart: unless-stopped

  # Optional: Use PostgreSQL instead of SQLite
